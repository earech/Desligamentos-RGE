name: Monitor RGE - Desligamentos Sao Marcos

on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verificar-desligamentos:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4.2.2

      - name: Configurar Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests

      - name: Consultar desligamentos
        id: consulta
        run: python verificar_rge.py

      - name: Salvar screenshots de diagnostico
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostico-rge
          path: |
            *.png
            *.html
          if-no-files-found: ignore

      - name: Sem desligamentos
        if: steps.consulta.outputs.status == 'ok'
        run: echo "Nenhum desligamento encontrado."

      - name: Decodificar alerta
        if: steps.consulta.outputs.tem_desligamento == 'true'
        run: |
          CORPO=$(echo "${{ steps.consulta.outputs.corpo_b64 }}" | base64 -d)
          echo "CORPO_EMAIL<<EOF" >> $GITHUB_ENV
          echo "$CORPO" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Enviar email
        if: steps.consulta.outputs.tem_desligamento == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_REMETENTE }}
          password: ${{ secrets.EMAIL_SENHA_APP }}
          to: ${{ secrets.EMAIL_DESTINATARIO }}
          from: Monitor RGE <${{ secrets.EMAIL_REMETENTE }}>
          subject: "Desligamento programado em Sao Marcos - RGE"
          body: ${{ env.CORPO_EMAIL }}
